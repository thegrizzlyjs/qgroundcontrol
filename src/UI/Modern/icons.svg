    <rect x="432" y="80" width="48" height="80" fill="none" stroke="#10B981" stroke-width="16" rx="4"/>
    <path d="M112 320 L352 320 L352 400 Q352 448 304 448 L160 448 Q112 448 112 400 Z" 
          fill="none" stroke="#10B981" stroke-width="16"/>
  </g>
  
  <!-- LIBRARY Icon -->
