    <circle cx="128" cy="240" r="8" fill="#3B82F6"/>
    <circle cx="192" cy="320" r="8" fill="#3B82F6"/>
    <circle cx="256" cy="160" r="8" fill="#3B82F6"/>
    <circle cx="320" cy="280" r="8" fill="#3B82F6"/>
    <circle cx="384" cy="120" r="8" fill="#3B82F6"/>
    <circle cx="448" cy="200" r="8" fill="#3B82F6"/>
    <line x1="64" y1="448" x2="448" y2="448" stroke="#3B82F6" stroke-width="16"/>
  </g>
  
