    <line x1="128" y1="64" x2="128" y2="96" stroke="#EF4444" stroke-width="16" stroke-linecap="round"/>
    <line x1="384" y1="64" x2="384" y2="96" stroke="#EF4444" stroke-width="16" stroke-linecap="round"/>
    <rect x="96" y="128" width="320" height="320" fill="none" stroke="#EF4444" stroke-width="16" rx="8"/>
    <line x1="160" y1="160" x2="160" y2="400" stroke="#EF4444" stroke-width="12"/>
    <line x1="256" y1="160" x2="256" y2="400" stroke="#EF4444" stroke-width="12"/>
    <line x1="352" y1="160" x2="352" y2="400" stroke="#EF4444" stroke-width="12"/>
  </g>
  
