    <rect x="64" y="64" width="128" height="384" fill="none" stroke="#F59E0B" stroke-width="16" rx="8"/>
    <line x1="96" y1="96" x2="160" y2="96" stroke="#F59E0B" stroke-width="8"/>
    <line x1="96" y1="144" x2="160" y2="144" stroke="#F59E0B" stroke-width="8"/>
    <line x1="96" y1="192" x2="160" y2="192" stroke="#F59E0B" stroke-width="8"/>
    <line x1="96" y1="240" x2="160" y2="240" stroke="#F59E0B" stroke-width="8"/>
    <line x1="96" y1="288" x2="160" y2="288" stroke="#F59E0B" stroke-width="8"/>
