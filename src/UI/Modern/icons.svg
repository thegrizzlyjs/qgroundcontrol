    <circle cx="256" cy="256" r="48" fill="none" stroke="#4B5563" stroke-width="16"/>
    <circle cx="256" cy="96" r="24" fill="none" stroke="#4B5563" stroke-width="16"/>
    <circle cx="256" cy="416" r="24" fill="none" stroke="#4B5563" stroke-width="16"/>
    <circle cx="96" cy="256" r="24" fill="none" stroke="#4B5563" stroke-width="16"/>
    <circle cx="416" cy="256" r="24" fill="none" stroke="#4B5563" stroke-width="16"/>
    <line x1="256" y1="120" x2="256" y2="208" stroke="#4B5563" stroke-width="16"/>
    <line x1="256" y1="304" x2="256" y2="392" stroke="#4B5563" stroke-width="16"/>
    <line x1="120" y1="256" x2="208" y2="256" stroke="#4B5563" stroke-width="16"/>
