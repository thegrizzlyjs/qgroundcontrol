  <g id="icon-layer">
    <rect x="64" y="96" width="384" height="96" fill="none" stroke="#00BCD4" stroke-width="16" rx="8"/>
    <rect x="64" y="208" width="384" height="96" fill="none" stroke="#00BCD4" stroke-width="16" rx="8"/>
    <rect x="64" y="320" width="384" height="96" fill="none" stroke="#00BCD4" stroke-width="16" rx="8"/>
    <line x1="80" y1="144" x2="432" y2="144" stroke="#00BCD4" stroke-width="8" opacity="0.5"/>
    <line x1="80" y1="256" x2="432" y2="256" stroke="#00BCD4" stroke-width="8" opacity="0.5"/>
  </g>
  
  <!-- VALIDATION Icon -->
  <g id="icon-validation">
    <circle cx="256" cy="256" r="160" fill="none" stroke="#F59E0B" stroke-width="16"/>
    <text x="256" y="280" font-size="96" text-anchor="middle" fill="#F59E0B" font-weight="bold">!</text>
    <circle cx="256" cy="400" r="20" fill="#F59E0B"/>
  </g>
  
  <!-- CHECK Icon -->
  <g id="icon-check">
    <path d="M 96 256 L 192 352 L 416 128" 
          fill="none" stroke="#10B981" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
