<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Icon Pack for QGroundControl Modern UI -->
  
  <!-- PLAN Icon -->
  <g id="icon-plan">
    <rect x="64" y="64" width="384" height="384" fill="none" stroke="#00BCD4" stroke-width="16" rx="16"/>
    <line x1="128" y1="128" x2="384" y2="128" stroke="#00BCD4" stroke-width="16"/>
    <line x1="64" y1="192" x2="448" y2="192" stroke="#00BCD4" stroke-width="16"/>
    <circle cx="96" cy="160" r="8" fill="#00BCD4"/>
    <circle cx="96" cy="224" r="8" fill="#00BCD4"/>
    <circle cx="96" cy="288" r="8" fill="#00BCD4"/>
  </g>
  
  <!-- FLY Icon -->
  <g id="icon-fly">
    <path d="M256 64 L448 256 L256 448 L64 256 Z" fill="none" stroke="#00BCD4" stroke-width="16"/>
    <circle cx="256" cy="256" r="32" fill="#00BCD4"/>
    <path d="M256 64 L256 128" stroke="#00BCD4" stroke-width="16" stroke-linecap="round"/>
  </g>
  
  <!-- VEHICLES Icon -->
