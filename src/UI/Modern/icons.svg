  <g id="icon-close">
    <line x1="96" y1="96" x2="416" y2="416" stroke="#EF4444" stroke-width="32" stroke-linecap="round"/>
    <line x1="416" y1="96" x2="96" y2="416" stroke="#EF4444" stroke-width="32" stroke-linecap="round"/>
  </g>
  
  <!-- MENU Icon -->
  <g id="icon-menu">
    <line x1="80" y1="128" x2="432" y2="128" stroke="#111827" stroke-width="32" stroke-linecap="round"/>
    <line x1="80" y1="256" x2="432" y2="256" stroke="#111827" stroke-width="32" stroke-linecap="round"/>
    <line x1="80" y1="384" x2="432" y2="384" stroke="#111827" stroke-width="32" stroke-linecap="round"/>
  </g>
  
</svg>
